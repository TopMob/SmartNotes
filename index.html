<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Notes | Wave Concept</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/stylessidebar.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body class="theme-deep-blue">

    <div id="login-screen" class="modal-system active">
        <div class="auth-card-v2">
            <div class="auth-visual">
                <div class="orb-glow"></div>
                <h1 class="auth-logo">Smart Notes</h1>
            </div>
            <div class="auth-content">
                <h2>Welcome Back</h2>
                <p>Твой цифровой разум ждет тебя</p>
                <button onclick="login()" class="google-auth-trigger">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Reference_Icon.svg" alt="G">
                    <span>Войти через Google</span>
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="app-container sidebar-collapsed">
        
        <header class="main-navigator">
            <div class="nav-left">
                <button class="menu-toggle-v2" onclick="UI.toggleSidebar()">
                    <span class="material-icons-round">menu_open</span>
                </button>
                <div class="brand-zone">
                    <span class="brand-text">Smart Notes</span>
                </div>
            </div>

            <div class="nav-center">
                <div class="search-capsule">
                    <span class="material-icons-round">search</span>
                    <input type="text" id="search-input" placeholder="Найти искру мысли..." oninput="state.searchQuery = this.value; filterAndRender()">
                    <div class="search-badge">⌘ K</div>
                </div>
            </div>

            <div class="nav-right">
                <div class="utility-actions">
                    <button class="util-btn" onclick="openSettings()">
                        <span class="material-icons-round">blur_on</span>
                    </button>
                </div>
                <div class="profile-capsule" onclick="UI.toggleUserMenu()">
                    <div class="profile-info">
                        <span id="user-name">Explorer</span>
                        <small>Online</small>
                    </div>
                    <div class="avatar-ring">
                        <img src="" id="user-photo" alt="Avatar">
                    </div>
                </div>
            </div>
        </header>

        <aside class="drawer-navigation" id="sidebar">
            <div class="drawer-content">
                <div class="drawer-section">
                    <div class="section-header">Library</div>
                    <div class="nav-list">
                        <div class="nav-item active" onclick="state.currentView = 'notes'; filterAndRender()">
                            <span class="material-icons-round">grid_view</span>
                            <span class="item-label">Все заметки</span>
                        </div>
                        <div class="nav-item" onclick="state.currentView = 'archive'; filterAndRender()">
                            <span class="material-icons-round">inventory_2</span>
                            <span class="item-label">Архив</span>
                        </div>
                    </div>
                </div>

                <div class="drawer-section">
                    <div class="section-header">Workspaces</div>
                    <div id="folders-list-container" class="folder-stack">
                        </div>
                    <button class="add-folder-trigger" onclick="openFolderModal()">
                        <span class="material-icons-round">create_new_folder</span>
                        <span>Новое пространство</span>
                    </button>
                </div>
            </div>

            <div class="drawer-footer">
                <div class="footer-grid">
                    <button onclick="openTeamModal()">Team</button>
                    <button onclick="confirmBotTransition()">Bot</button>
                    <button class="rate-us" onclick="openFeedbackModal()">Rate App</button>
                </div>
            </div>
        </aside>

        <main class="content-viewport">
            <div class="viewport-header">
                <h2 id="view-title">My Thoughts</h2>
                <div class="view-options">
                    <button class="view-tab active">Recent</button>
                    <button class="view-tab">Pinned</button>
                </div>
            </div>

            <div class="masonry-wrapper">
                <div id="notes-grid" class="notes-masonry">
                    </div>
            </div>
        </main>

        <button class="floating-action-button" onclick="openEditor()" title="Создать заметку">
            <span class="material-icons-round">add</span>
            <div class="fab-wave"></div>
        </button>

        <div id="user-dropdown" class="glass-dropdown">
            <div class="user-card-mini">
                <div class="mini-avatar">
                    <img src="" id="drop-user-photo" alt="">
                </div>
                <div class="mini-meta">
                    <b id="drop-user-name">User</b>
                    <span id="drop-user-email">email@space.com</span>
                </div>
            </div>
            <div class="drop-divider"></div>
            <div class="drop-menu">
                <div class="drop-item" onclick="switchAccount()">
                    <span class="material-icons-round">face</span>
                    <span>Сменить аккаунт</span>
                </div>
                <div class="drop-item logout" onclick="logout()">
                    <span class="material-icons-round">logout</span>
                    <span>Завершить сессию</span>
                </div>
            </div>
        </div>

    </div>

    <div id="editor-modal" class="editor-overlay">
        <div class="editor-glass-panel">
            <div class="editor-top-bar">
                <button class="editor-back" onclick="closeEditor()">
                    <span class="material-icons-round">arrow_back</span>
                </button>
                <div class="editor-meta-zone">
                    <div class="priority-chip" id="priority-btn" onclick="togglePriority()">
                        <span class="p-dot"></span>
                        <span id="priority-label">Low Priority</span>
                    </div>
                </div>
                <button class="editor-done" onclick="closeEditor()">
                    <span>Done</span>
                </button>
            </div>
            <div class="editor-scroller">
                <input type="text" id="note-title" class="input-hero-title" placeholder="Введите заголовок...">
                <textarea id="note-content" class="input-hero-body" placeholder="Твои идеи начинаются здесь..."></textarea>
            </div>
            <div class="editor-bottom-bar">
                <div class="tag-zone">
                    <div id="note-tags-container" class="tag-flex"></div>
                    <input type="text" id="note-tags-input" placeholder="#добавь_тег">
                </div>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="system-alert-overlay">
        <div class="alert-card">
            <div class="alert-icon-box">
                <span class="material-icons-round">help_outline</span>
            </div>
            <h3 id="confirm-title">Confirm Action</h3>
            <p id="confirm-text"></p>
            <div class="alert-buttons">
                <button onclick="closeConfirm()" class="btn-ghost">Cancel</button>
                <button id="confirm-action-btn" class="btn-solid">Confirm</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ab.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
